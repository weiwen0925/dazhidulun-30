<style>

  --bg:#f7f3ec;--text:#2c2416;--text2:#5a4e3a;--text-muted:#6B5B4B;
  --accent:#8b5e3c;--accentL:#c4956a;--accent-red:#8B2500;

  --card:#fffdf7;--verseBg:#f0e8d8;--verseBd:#c4956a;
  --sbW:96px;--sbBg:#1e1a14;--sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px;
}
*{box-sizing:border-box;}
html,body{scrollbar-width:none;-ms-overflow-style:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
html,body{margin:0;padding:0;}
body{

  -webkit-user-select:none;-moz-user-select:none;user-select:none;
}
a{color:inherit;text-decoration:none;}

/* ───── sidebar ───── */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;
  background:var(--sbBg);color:var(--sbText);z-index:100;

  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;}
.sb-brand{position:sticky;top:0;width:100%;
  font-family:"Noto Sans TC",sans-serif;letter-spacing:2px;
  color:var(--gold);text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 80%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;cursor:pointer;
  transition:color .25s;display:block;
  border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand-line2{display:block;font-size:13px;font-weight:700;letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:3px;}
.sb-nav{display:flex;flex-direction:column;gap:4px;width:100%;align-items:center;margin-top:4px;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:4px 4px;width:100%;cursor:pointer;border-radius:8px;transition:background .2s;}
.sb-item:hover{background:rgba(184,134,11,.14);}
.sb-circle{width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(212,196,168,.4);font-family:"Noto Sans TC",sans-serif;
  font-size:15px;font-weight:600;color:var(--sbText);transition:all .2s;}
.sb-label{font-size:11.5px;font-family:"Noto Sans TC",sans-serif;
  letter-spacing:.3px;opacity:.86;text-align:center;line-height:1.25;}
.sb-item.active .sb-circle{background:var(--gold);color:#1e1a14;border-color:var(--goldL);
  box-shadow:0 0 12px rgba(184,134,11,.6);}
.sb-item.active .sb-label{color:var(--goldL);opacity:1;}

/* 導覽列尾端 · 跨卷連結（金線區隔） */
.sb-foot{width:100%;margin-top:16px;padding:14px 4px 4px;
  border-top:1px solid var(--gold);
  display:flex;flex-direction:column;align-items:center;gap:9px;}
.sb-extra{display:flex;flex-direction:column;align-items:center;gap:2px;width:100%;
  padding:5px 2px;border-radius:8px;cursor:pointer;transition:background .2s;text-align:center;}
.sb-extra:hover{background:rgba(184,134,11,.16);}
.sb-extra .se-ico{font-size:16px;line-height:1;color:var(--goldL);}
.sb-extra .se-lbl{font-size:11px;font-family:"Noto Sans TC",sans-serif;
  color:var(--sbText);letter-spacing:.3px;line-height:1.25;opacity:.88;}
.sb-extra:hover .se-lbl{color:var(--goldL);opacity:1;}

#sbToggle{display:none;position:fixed;left:12px;top:12px;z-index:130;
  width:42px;height:42px;border-radius:8px;border:none;cursor:pointer;
  background:var(--sbBg);color:var(--gold);font-size:20px;}

/* ───── main ───── */
.main{margin-left:var(--sbW);}
.site-hero{position:relative;overflow:hidden;
  background:var(--headGrad);color:#f3ead4;text-align:center;
  padding:72px 24px 60px;}
.site-hero::before{content:"般若";position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);font-size:280px;font-weight:900;
  color:rgba(212,168,75,.04);white-space:nowrap;pointer-events:none;}
.hero-tag{position:relative;font-family:"Noto Sans TC",sans-serif;font-size:14px;
  letter-spacing:6px;color:var(--goldL);opacity:.9;margin-bottom:16px;}
.hero-title{position:relative;font-size:56px;font-weight:900;color:var(--goldL);
  letter-spacing:8px;margin:0 0 14px;}
.hero-subtitle{position:relative;font-size:20px;color:#e6d9bd;letter-spacing:2px;margin-bottom:18px;}
.hero-range{position:relative;font-family:"Noto Sans TC",sans-serif;font-size:17px;
  color:#d4c4a8;letter-spacing:1px;line-height:1.9;}
.hero-eng{position:relative;font-family:Georgia,serif;font-style:italic;
  font-size:15px;color:rgba(212,196,168,.7);letter-spacing:1px;margin-top:14px;}

/* ───── preface ───── */
.preface{max-width:860px;margin:48px auto 8px;padding:0 28px;}
.preface-title{text-align:center;font-size:30px;color:var(--accent);
  letter-spacing:6px;margin:0 0 24px;font-weight:700;}
.preface p{font-size:19px;line-height:2.1;color:var(--text2);margin:0 0 16px;text-align:justify;}

/* ───── TOC ───── */
.toc-section{max-width:1100px;margin:40px auto 8px;padding:0 28px;}
.toc-title{text-align:center;font-size:34px;color:var(--accent);letter-spacing:10px;margin:0 0 10px;font-weight:700;}
.toc-desc{text-align:center;font-family:"Noto Sans TC",sans-serif;font-size:17px;
  color:var(--text-muted);letter-spacing:1px;margin:0 0 30px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;}
.toc-card{display:flex;gap:16px;align-items:flex-start;
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:18px 20px;cursor:pointer;transition:all .25s;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.toc-card:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(91,58,41,.14);border-color:var(--gold);}
.toc-num{flex:none;width:40px;height:40px;border-radius:50%;
  background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:"Noto Sans TC",sans-serif;font-size:17px;font-weight:700;}
.toc-body{flex:1;}
.toc-name{font-size:19.5px;font-weight:700;color:var(--text);line-height:1.7;margin-bottom:4px;}
.toc-sub{font-family:"Noto Sans TC",sans-serif;font-size:13.5px;color:var(--text-muted);line-height:1.6;}

/* ───── chapter ───── */
.chapter{margin:30px 0 0;}
.ch-head{background:var(--headGrad);color:#f3ead4;text-align:center;padding:46px 24px 40px;position:relative;}
.ch-num{font-family:"Noto Sans TC",sans-serif;font-size:18px;letter-spacing:3px;color:var(--goldL);margin-bottom:12px;}
.ch-name{font-size:34px;font-weight:900;color:#f6edd6;letter-spacing:4px;margin:0 0 12px;}
.ch-sub{font-family:"Noto Sans TC",sans-serif;font-size:17px;color:#d8c9a9;letter-spacing:1px;}
.ch-head::after{content:"";display:block;width:64px;height:2px;background:var(--gold);margin:18px auto 0;}
.ch-body{max-width:980px;margin:0 auto;padding:32px 28px 8px;}

/* ───── bridge ───── */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);border-radius:10px;
  padding:18px 24px;margin:0 0 26px;box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;font-size:12.5px;
  background:var(--gold);color:#fff;padding:3px 12px;border-radius:12px;letter-spacing:2.2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2.1;font-size:18.5px;text-align:justify;}

/* ───── iframe ───── */
.ch-frame{display:block;width:100%;border:0;background:#fffdf7;
  border:1px solid var(--border);border-radius:12px;
  box-shadow:0 4px 20px rgba(91,58,41,.1);margin:0 0 8px;min-height:180px;}

.next-link{display:inline-block;margin:8px 0 12px;font-family:"Noto Sans TC",sans-serif;
  font-size:17px;color:var(--accent);border:1px solid var(--gold);
  padding:8px 20px;border-radius:24px;cursor:pointer;transition:all .2s;}
.next-link:hover{background:var(--gold);color:#fff;}

/* ───── progress capsule ───── */
.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:120;
  background:rgba(30,26,20,.92);color:var(--gold);padding:9px 24px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:"Noto Sans TC",sans-serif;font-size:14px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;pointer-events:none;user-select:none;
  backdrop-filter:blur(6px);transition:opacity .45s ease,transform .45s ease;}
.read-progress.hide-near-end{opacity:0;transform:translateX(-50%) translateY(28px);}
.read-progress .rp-label{font-size:12px;opacity:.85;letter-spacing:4px;color:var(--goldL);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}

/* ───── footer ───── */
.site-footer{background:var(--headGrad);color:#cdbf9f;text-align:center;
  padding:40px 24px;margin-top:48px;font-family:"Noto Sans TC",sans-serif;font-size:15px;letter-spacing:1px;line-height:2;}
.site-footer .ft-title{color:var(--goldL);font-size:18px;letter-spacing:3px;margin-bottom:10px;font-weight:700;}

#backTop{position:fixed;right:22px;bottom:22px;width:44px;height:44px;border-radius:50%;
  border:none;cursor:pointer;background:var(--sbBg);color:var(--gold);font-size:20px;
  z-index:120;opacity:0;pointer-events:none;transition:opacity .3s;box-shadow:0 3px 12px rgba(0,0,0,.3);}
#backTop.show{opacity:1;pointer-events:auto;}

/* ───── responsive ───── */
@media(max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:block;}
  .main{margin-left:0;}
  .hero-title{font-size:40px;letter-spacing:4px;}
  .site-hero::before{font-size:160px;}
  .ch-name{font-size:26px;}
  .ch-body{padding:24px 16px 8px;}
}
@media(max-width:600px){
  .hero-title{font-size:32px;}
  .toc-title{font-size:26px;letter-spacing:6px;}
}

  font-weight:700;letter-spacing:1px;}

<button aria-label="回到頂部" id="backTop">↑</button>
<script>
// sticky brand → 回頂
var sbBrand=document.getElementById('sbBrand');
if(sbBrand){sbBrand.addEventListener('click',function(e){e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});});}

// 漢堡選單
var sbToggle=document.getElementById('sbToggle'),sb=document.getElementById('sb');
if(sbToggle&&sb){sbToggle.addEventListener('click',function(){sb.classList.toggle('open');});}

// 進度條
var rpFill=document.getElementById('rpFill'),rpPct=document.getElementById('rpPct');
function updateProgress(){
  var sh=document.documentElement.scrollHeight-window.innerHeight;
  var pct=sh>0?Math.min(100,Math.max(0,window.scrollY/sh*100)):0;
  if(rpFill)rpFill.style.width=pct+'%';
  if(rpPct)rpPct.textContent=Math.round(pct)+'%';
}
window.addEventListener('scroll',updateProgress,{passive:true});updateProgress();

// 接近頁尾淡出
(function(){
  var cap=document.getElementById('readProgress');if(!cap)return;
  function setHide(on){cap.classList.toggle('hide-near-end',!!on);}
  var f2=document.querySelector('.site-footer');if(!f2)return;
  if('IntersectionObserver' in window){
    var io=new IntersectionObserver(function(es){setHide(es.some(function(e){return e.isIntersecting;}));},
      {root:null,rootMargin:'0px 0px -20px 0px',threshold:0.01});
    io.observe(f2);
  }
})();

// backTop
var backTop=document.getElementById('backTop');
window.addEventListener('scroll',function(){
  if(backTop){if(window.scrollY>600)backTop.classList.add('show');else backTop.classList.remove('show');}
},{passive:true});
if(backTop)backTop.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});

// 側欄高亮
var chapters=[].slice.call(document.querySelectorAll('.chapter'));
var sbItems=[].slice.call(document.querySelectorAll('.sb-item'));
function highlight(){
  var idx=-1,th=window.innerHeight*0.35;
  for(var i=0;i<chapters.length;i++){
    if(chapters[i].getBoundingClientRect().top<th)idx=i;
  }
  sbItems.forEach(function(it,i){it.classList.toggle('active',i===idx);});
}
window.addEventListener('scroll',highlight,{passive:true});highlight();

// iframe 自動高度（只量 body.scrollHeight，無 buffer）
function resizeFrame(f){
  try{
    var d=f.contentDocument||f.contentWindow.document;
    if(!d||!d.body)return;
    d.body.style.minHeight='0';d.body.style.height='auto';
    if(d.documentElement){d.documentElement.style.minHeight='0';d.documentElement.style.height='auto';}
    var h=d.body.scrollHeight;
    if(h>100){f.style.height=h+'px';f.style.minHeight='0';}
  }catch(e){}
}
function resizeAllFrames(){
  document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
  if(typeof updateProgress==='function')updateProgress();
}
function setupFrame(f){
  var tries=0;
  function tick(){tries++;resizeFrame(f);if(tries<30)setTimeout(tick,200);}
  if(f.contentDocument&&f.contentDocument.readyState==='complete')tick();
  else f.addEventListener('load',tick);
}
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
var rzT;
window.addEventListener('resize',function(){clearTimeout(rzT);rzT=setTimeout(resizeAllFrames,200);});

// 錨點點擊防錯跳
document.addEventListener('click',function(e){
  var a=e.target;while(a&&a.tagName!=='A')a=a.parentElement;if(!a)return;
  var h=a.getAttribute('href');if(!h||h.charAt(0)!=='#'||h.length<2)return;
  var id=h.substring(1);var el=document.getElementById(id);if(!el)return;
  e.preventDefault();resizeAllFrames();
  setTimeout(function(){
    resizeAllFrames();
    var rect=el.getBoundingClientRect();
    window.scrollTo({top:window.scrollY+rect.top-20,behavior:'smooth'});
  },60);
},true);

// 持續輪詢確保定稿
var _rt=0,_riv=setInterval(function(){_rt++;resizeAllFrames();if(_rt>50)clearInterval(_riv);},300);

// 節層級錨點 · 跨 iframe 深連結  #chapter-{品}-{章}-{節}
function wyDeepLink(retries){
  var m=(location.hash||'').match(/^#chapter-(\d+)-(\d+)-(\d+)$/);
  if(!m)return;
  var p=parseInt(m[1],10);
  var frames=document.querySelectorAll('iframe.ch-frame');
  var f=frames[p-1];if(!f)return;
  var targetId='chapter-'+m[1]+'-'+m[2]+'-'+m[3];
  try{
    var d=f.contentDocument||f.contentWindow.document;
    var el=d&&d.getElementById(targetId);
    if(!el){if((retries||0)<45)setTimeout(function(){wyDeepLink((retries||0)+1);},200);return;}
    resizeAllFrames();
    setTimeout(function(){
      resizeAllFrames();
      var fr=f.getBoundingClientRect(),er=el.getBoundingClientRect();
      window.scrollTo({top:window.scrollY+fr.top+er.top-30,behavior:'smooth'});
    },80);
  }catch(e){if((retries||0)<45)setTimeout(function(){wyDeepLink((retries||0)+1);},200);}
}
window.addEventListener('hashchange',function(){wyDeepLink(0);});
if(location.hash)setTimeout(function(){wyDeepLink(0);},400);

// 外層防複製
(function(){
  var blk=function(e){e.preventDefault();return false;};
  ['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
    document.addEventListener(ev,blk,true);
  });
  document.addEventListener('keydown',function(e){
    var k=e.key;
    if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X'))blk(e);
    if(k==='F12')blk(e);
    if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K'))blk(e);
  },true);
})();
</script>

<script id="wy-print-intercept">
(function(){
  try{ window.print = function(){}; }catch(e){}
  document.addEventListener("keydown", function(e){
    if((e.metaKey||e.ctrlKey) && (e.key==="p"||e.key==="P"||e.keyCode===80)){
      e.preventDefault(); e.stopPropagation();
      return false;
    }
  }, true);
})();
</script>
<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy-dazhidulun-30-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
